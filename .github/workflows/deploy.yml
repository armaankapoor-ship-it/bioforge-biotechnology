name: Deploy BioForge to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Build chapter websites
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          chapters=(
            "chapter1:chapter1-flowering-reproduction"
            "chapter2:chapter2-human-reproduction"
            "chapter3:chapter3-reproductive-health"
            "chapter4:chapter4-inheritance-variation"
            "chapter5:chapter5-molecular-basis"
            "chapter6:chapter6-evolution"
            "chapter7:chapter7-human-health-disease"
            "chapter8:chapter8-microbes-human-welfare"
            "chapter10:chapter10-biotechnology-applications"
            "chapter11:chapter11-organisms-populations"
            "chapter12:chapter12-ecosystem"
          )

          for entry in "${chapters[@]}"; do
            public_path="${entry%%:*}"
            source_dir="${entry#*:}"
            echo "Building ${public_path} from ${source_dir}"
            (
              cd "${source_dir}"
              VITE_BASE_PATH="/${REPO_NAME}/${public_path}/" ../node_modules/.bin/vite build
            )
            mkdir -p "./dist/${public_path}"
            cp -R "./${source_dir}/dist/"* "./dist/${public_path}/"
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
